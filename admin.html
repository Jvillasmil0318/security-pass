<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Pepsi SF</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar-pepsi { background-color: #005cb4; color: white; }
    </style>
</head>
<body>
    <nav class="navbar navbar-pepsi mb-4 p-3">
        <h2 class="m-0">Pepsi SF - Administración de Acceso</h2>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-4">
                <div class="card shadow-sm p-4 mb-4">
                    <h4>Registrar Nuevo Camión</h4>
                    <hr>
                    <input type="text" id="newPlaca" class="form-control mb-2" placeholder="Placa (Matrícula)">
                    <input type="text" id="newModelo" class="form-control mb-2" placeholder="Modelo (Ej: Volvo VNL)">
                    <select id="isAutorizado" class="form-select mb-3">
                        <option value="true">Autorizado</option>
                        <option value="false">No Autorizado</option>
                    </select>
                    <button class="btn btn-primary w-100" onclick="agregarVehiculo()">Guardar en Base de Datos</button>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card shadow-sm p-4">
                    <h4>Historial de Entradas (Hoy)</h4>
                    <table class="table table-striped mt-3">
                        <thead>
                            <tr>
                                <th>Hora</th>
                                <th>Placa</th>
                                <th>Estatus</th>
                            </tr>
                        </thead>
                        <tbody id="listaEntradas">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN DE SUPABASE (Reemplaza con tus llaves)
        const supabaseUrl = 'TU_SUPABASE_URL';
        const supabaseKey = 'TU_SUPABASE_ANON_KEY';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function agregarVehiculo() {
            const placa = document.getElementById('newPlaca').value;
            const modelo = document.getElementById('newModelo').value;
            const autorizado = document.getElementById('isAutorizado').value === 'true';

            const { error } = await supabase
                .from('vehiculos')
                .insert([{ placa, modelo, autorizado }]);

            if (error) alert("Error al guardar: " + error.message);
            else alert("Vehículo guardado correctamente");
        }

        async function cargarEntradas() {
            const { data, error } = await supabase
                .from('entradas')
                .select('fecha_entrada, placa_vehiculo')
                .order('fecha_entrada', { ascending: false });

            const tbody = document.getElementById('listaEntradas');
            tbody.innerHTML = data.map(e => `
                <tr>
                    <td>${new Date(e.fecha_entrada).toLocaleTimeString()}</td>
                    <td>${e.placa_vehiculo}</td>
                    <td><span class="badge bg-success">Ingresado</span></td>
                </tr>
            `).join('');
        }

        // Cargar datos al iniciar
        cargarEntradas();
        // Recargar cada 30 segundos
        setInterval(cargarEntradas, 30000);
    </script>
    <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
</body>
</html>
